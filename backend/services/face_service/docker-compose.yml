# Docker Compose 配置
version: '3.8'

services:
  face-service:
    build: .
    container_name: face-recognition-service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_PORT=8001
      - DATABASE_URL=sqlite:///data/face_service.db
      - SECRET_KEY=your-secret-key-change-in-production
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s